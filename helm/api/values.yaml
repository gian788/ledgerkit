replicaCount: 2

image:
  repository: ghcr.io/org/ledger
  # tag defaults to Chart.appVersion
  tag: ""
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# Non-sensitive environment variables
env:
  NODE_ENV: production
  PORT: "3000"
  KAFKA_BROKERS: kafka:9092
  OTEL_ENABLED: "true"
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
  OTEL_METRICS_PORT: "9464"

# Sensitive env vars — create the secret out-of-band then reference it here
secrets:
  # kubectl create secret generic ledger-api \
  #   --from-literal=DATABASE_URL='postgresql://...'
  name: ledger-api
  databaseUrlKey: DATABASE_URL

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9464"
  prometheus.io/path: /metrics
