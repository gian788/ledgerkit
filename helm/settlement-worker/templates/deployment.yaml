apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "settlement-worker.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "settlement-worker.labels" . | nindent 4 }}
spec:
  # When KEDA is enabled the ScaledObject manages replica count.
  # replicaCount here is used as the initial value and as fallback when KEDA is disabled.
  replicas: {{ if .Values.keda.enabled }}{{ .Values.keda.minReplicas }}{{ else }}{{ .Values.replicaCount }}{{ end }}
  selector:
    matchLabels:
      {{- include "settlement-worker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "settlement-worker.selectorLabels" . | nindent 8 }}
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
    spec:
      serviceAccountName: {{ include "settlement-worker.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      # Spread pods across availability zones — replicas ≤ partitions (DD-15)
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "settlement-worker.selectorLabels" . | nindent 20 }}
                topologyKey: topology.kubernetes.io/zone
      containers:
        - name: settlement-worker
          image: {{ include "settlement-worker.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: metrics
              containerPort: 9464
              protocol: TCP
          env:
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: {{ .Values.secrets.databaseUrlKey }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
