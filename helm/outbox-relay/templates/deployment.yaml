apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "outbox-relay.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "outbox-relay.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "outbox-relay.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "outbox-relay.selectorLabels" . | nindent 8 }}
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
    spec:
      serviceAccountName: {{ include "outbox-relay.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      # Spread the two replicas across zones so standby is in a different AZ (DD-15)
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  {{- include "outbox-relay.selectorLabels" . | nindent 18 }}
              topologyKey: topology.kubernetes.io/zone
      containers:
        - name: outbox-relay
          image: {{ include "outbox-relay.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: metrics
              containerPort: 9464
              protocol: TCP
          env:
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: {{ .Values.secrets.databaseUrlKey }}
            # Expose pod identity for Lease-based leader election
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: LEASE_NAME
              value: {{ .Values.leaderElection.leaseName | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
