apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "audit-consumer.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "audit-consumer.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "audit-consumer.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "audit-consumer.selectorLabels" . | nindent 8 }}
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
    spec:
      serviceAccountName: {{ include "audit-consumer.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      # Spread replicas across availability zones (DD-15)
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "audit-consumer.selectorLabels" . | nindent 20 }}
                topologyKey: topology.kubernetes.io/zone
      containers:
        - name: audit-consumer
          image: {{ include "audit-consumer.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: metrics
              containerPort: 9464
              protocol: TCP
          env:
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: {{ .Values.secrets.s3AccessKeyIdKey }}
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: {{ .Values.secrets.s3SecretAccessKeyKey }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
