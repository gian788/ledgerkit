replicaCount: 2

image:
  repository: ghcr.io/org/ledger
  tag: ""
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

env:
  KAFKA_BROKERS: kafka:9092
  KAFKA_TOPIC_AUDIT: audit.events
  S3_ENDPOINT: ""
  S3_REGION: us-east-1
  S3_AUDIT_BUCKET: ledger-audit
  S3_FORCE_PATH_STYLE: "false"
  OTEL_ENABLED: "true"
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
  OTEL_METRICS_PORT: "9464"

# Secret must contain S3_ACCESS_KEY_ID and S3_SECRET_ACCESS_KEY (and optionally others)
# kubectl create secret generic ledger-audit-consumer \
#   --from-literal=S3_ACCESS_KEY_ID='...' \
#   --from-literal=S3_SECRET_ACCESS_KEY='...'
secrets:
  name: ledger-audit-consumer
  s3AccessKeyIdKey: S3_ACCESS_KEY_ID
  s3SecretAccessKeyKey: S3_SECRET_ACCESS_KEY

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9464"
  prometheus.io/path: /metrics
